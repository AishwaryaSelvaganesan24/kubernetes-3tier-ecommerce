apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: hashicorp/http-echo
        command: ["/http-echo"]
        args:
          - "-text=Hello from Backend"
          - "-listen=:5678"
        ports:
        - containerPort: 5678